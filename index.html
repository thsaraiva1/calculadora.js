<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <main class="calculadora">

        <!-- VISOR -->
         <div class="visor" id="visor">
           0
         </div>
         
         <!-- BOTOES -->
          <div class="botoes">


         <!-- Row 1 -->
          <button data-acao="limpar">C</button>
          <button data-acao="apagar">⌫</button>
          <button data-operador="/">÷</button>
          <button data-operador="*">x</button>

          <!-- Row 2-->
           <button data-numero="7">7</button>
           <button data-numero="8">8</button>
           <button data-numero="9">9</button>
           <button data-operador="-">-</button>
           

          <!-- Row 3-->
           <button data-numero="4">4</button>
           <button data-numero="5">5</button>
           <button data-numero="6">6</button>
           <button data-operador="+">+</button>
           

          <!-- Row 4 --> 
           <button data-numero="1">1</button>
           <button data-numero="2">2</button>
           <button data-numero="3">3</button>
           <button data-acao="igual">=</button>
           

            <!-- Row 5 --> 
           <button data-numero="0" class="zero">0</button>
           <button data-numero=".">.</button>
           
          


        </div>

    </main>
    <script src="script.js"></script>
    
</body>
</html>
